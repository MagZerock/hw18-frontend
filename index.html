<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edison's Computer Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="public/styles.css">
</head>

<body>

    <nav>
        <div class="logo">
            💻 <span>David's</span> Computer Store
        </div>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('view', event)">Customer View</button>
            <button class="tab-btn" onclick="switchTab('add', event)">Add Client</button>
        </div>
    </nav>

    <main>
        <section id="view-section" class="view-section active">
            <div class="card">
                <h2>Customer List</h2>
                <div id="viewAlert" class="alert"></div>
                <div class="table-container">
                    <table id="customerTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Age</th>
                                <th>Money Spent</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr>
                                <td colspan="5" class="empty-state">Loading data...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="total-block" style="margin-top: 15px; text-align: right; font-size: 1.2rem;">
                    <span>Total Money Spent: </span>
                    <span id="total-display" style="font-weight: bold;">$0.00</span>
                </div>
            </div>
        </section>

        <section id="add-section" class="view-section">
            <div class="card form-container">
                <h2>Register New Customer</h2>
                <div id="formAlert" class="alert"></div>
                <form id="addForm">
                    <div class="form-group">
                        <label for="id">Customer ID</label>
                        <input type="number" id="id" name="id" required placeholder="Enter unique ID">
                    </div>
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" required placeholder="Enter full name">
                    </div>
                    <div class="form-group">
                        <label for="age">Age</label>
                        <input type="number" id="age" name="age" required min="1" placeholder="Enter age">
                    </div>
                    <div class="form-group">
                        <label for="money">Money Spent ($)</label>
                        <input type="number" id="money" name="money" required step="0.01" min="0" placeholder="0.00">
                    </div>
                    <button type="submit" class="submit-btn">Register Customer</button>
                </form>
            </div>
        </section>
    </main>

    <div id="editModal" class="modal">
        <div class="modal-content card" style="max-width: 500px;">
            <h2>Edit Customer</h2>
            <div id="editAlert" class="alert"></div>
            <form id="editForm">
                <input type="hidden" id="edit-_id">
                <div class="form-group">
                    <label for="edit-id">Customer ID</label>
                    <input type="number" id="edit-id" name="id" required>
                </div>
                <div class="form-group">
                    <label for="edit-name">Full Name</label>
                    <input type="text" id="edit-name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="edit-age">Age</label>
                    <input type="number" id="edit-age" name="age" required min="1">
                </div>
                <div class="form-group">
                    <label for="edit-money">Money Spent ($)</label>
                    <input type="number" id="edit-money" name="money" required step="0.01" min="0">
                </div>
                <div class="modal-actions" style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                    <button type="button" class="tab-btn" onclick="closeEditModal()"
                        style="border: 1px solid var(--border-color); flex: 1;">Cancel</button>
                    <button type="submit" class="submit-btn" style="margin-top: 0; flex: 1;">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <div id="deleteModal" class="modal">
        <div class="modal-content card">
            <h2>Confirm Deletion</h2>
            <p style="text-align: center; margin-bottom: 1.5rem; color: var(--text-muted);">Are you sure you want to
                delete this customer? This action cannot be undone.</p>
            <div class="modal-actions" style="display: flex; gap: 1rem; justify-content: center;">
                <button class="tab-btn" onclick="closeDeleteModal()"
                    style="border: 1px solid var(--border-color);">Cancel</button>
                <button class="submit-btn" onclick="confirmDelete()"
                    style="margin-top: 0; background: linear-gradient(135deg, var(--error-color), #b91c1c);">Yes,
                    delete</button>
            </div>
        </div>
    </div>

    <script src="public/app.js"></script>
</body>

</html>
